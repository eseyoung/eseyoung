<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080808;
    --white: #f0efeb;
    --mid: #666666;
    --border: #222222;
    --border-light: #2a2a2a;
    --blue: #4a7eff;
    --font-ko: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    --font-en: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --tr: 0.35s cubic-bezier(0.4,0,0.2,1);
  }

  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--white);
    font-family: var(--font-ko);
    font-size: 15px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .page { display: none; opacity: 0; transform: translateY(10px); transition: opacity 0.38s ease, transform 0.38s ease; }
  .page.active { display: block; opacity: 1; transform: translateY(0); }
  .en { font-family: var(--font-en) !important; }

  /* ══════════════════
     NAV
  ══════════════════ */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 48px;
    background: rgba(8,8,8,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid transparent;
    transition: border-color var(--tr);
  }
  nav.scrolled { border-bottom-color: var(--border); }
  .nav-mark {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--white); cursor: pointer;
    transition: background var(--tr); flex-shrink: 0;
  }
  .nav-mark:hover { background: var(--blue); }
  .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
  .nav-links a, .nav-links button {
    font-family: var(--font-en);
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--mid); text-decoration: none;
    background: none; border: none; cursor: pointer; padding: 0;
    transition: color var(--tr);
  }
  .nav-links a:hover, .nav-links button:hover, .nav-links a.nav-active { color: var(--white); }
  .lang-toggle {
    display: flex; gap: 6px; align-items: center;
    margin-left: 12px; border-left: 1px solid var(--border-light); padding-left: 20px;
  }
  .lang-btn { color: #333 !important; font-size: 11px !important; transition: color var(--tr) !important; }
  .lang-btn.active { color: var(--white) !important; }
  .lang-sep { color: #2a2a2a; font-size: 11px; }

  /* ══════════════════
     SHARED
  ══════════════════ */
  .section-label {
    font-family: var(--font-en);
    font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #333; margin-bottom: 48px;
    display: flex; align-items: center; gap: 16px;
  }
  .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); max-width: 100px; }
  .meta-group { margin-bottom: 36px; }
  .meta-label {
    font-family: var(--font-en);
    font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase;
    color: #333; margin-bottom: 10px;
  }
  .meta-value { font-size: 13px; line-height: 1.65; color: #666; font-family: var(--font-en); }
  .meta-block { display: block; margin-bottom: 20px; }
  .meta-block:last-child { margin-bottom: 0; }
  /* first line of each block (school/company name) slightly brighter */
  .about-title.en { font-family: var(--font-en); letter-spacing: -0.03em; }
  .btn-back {
    font-family: var(--font-en);
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #333; background: none; border: none; cursor: pointer;
    display: inline-flex; align-items: center; gap: 10px;
    transition: color var(--tr); padding: 0;
  }
  .btn-back:hover { color: var(--blue); }
  footer {
    border-top: 1px solid var(--border);
    padding: 48px;
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .footer-name { font-size: 26px; font-weight: 300; color: var(--white); }
  .footer-links { display: flex; flex-direction: column; gap: 10px; text-align: right; }
  .footer-links a {
    font-family: var(--font-en);
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    color: #333; text-decoration: none; transition: color var(--tr);
  }
  .footer-links a:hover { color: var(--blue); }
  .footer-copy { font-family: var(--font-en); font-size: 10px; color: #222; margin-top: 8px; }

  /* ══════════════════
     HERO
  ══════════════════ */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 0 48px 80px;
    position: relative; overflow: hidden;
    background: var(--bg); cursor: default;
  }
  .hero-gradient {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 20% 60%, rgba(30,60,200,0.18) 0%, transparent 70%),
                radial-gradient(ellipse 50% 50% at 80% 30%, rgba(10,30,160,0.10) 0%, transparent 60%);
    opacity: 0; transition: opacity 1.2s ease; pointer-events: none;
  }
  .hero:hover .hero-gradient { opacity: 1; }
  .hero-blob {
    position: absolute; width: 900px; height: 700px; border-radius: 50%;
    background: radial-gradient(ellipse, rgba(40,80,255,0.12) 0%, transparent 70%);
    pointer-events: none; transform: translate(-50%, -50%);
    transition: left 0.9s cubic-bezier(0.2,0,0.1,1), top 0.9s cubic-bezier(0.2,0,0.1,1), opacity 0.6s ease;
    opacity: 0;
  }
  .hero:hover .hero-blob { opacity: 1; }
  .hero-content { position: relative; z-index: 1; max-width: 1000px; }
  .hero-title {
    font-family: var(--font-ko);
    font-size: clamp(36px, 5vw, 72px);
    line-height: 1.08; letter-spacing: -0.03em;
    margin-bottom: 44px; font-weight: 300; color: var(--white);
  }
  .hero-title.en { font-family: var(--font-en); font-weight: 600; letter-spacing: -0.01em; }
  .hero-sub {
    font-size: 15px; color: var(--mid); max-width: 640px;
    line-height: 1.8; margin-bottom: 52px;
    word-break: keep-all; word-wrap: break-word;
  }
  .btn-primary {
    display: inline-block; font-family: var(--font-en);
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--bg); background: var(--white);
    padding: 14px 36px; border: none; cursor: pointer;
    transition: background var(--tr), color var(--tr);
  }
  .btn-primary:hover { background: var(--blue); color: #fff; }
  .hero-scroll {
    position: absolute; bottom: 36px; right: 48px;
    display: flex; flex-direction: column; align-items: center; gap: 10px; z-index: 2;
  }
  .hero-scroll span {
    font-family: var(--font-en); font-size: 9px; letter-spacing: 0.22em;
    text-transform: uppercase; color: #333; writing-mode: vertical-rl;
  }
  .scroll-line { width: 1px; height: 56px; background: #1a1a1a; position: relative; overflow: hidden; }
  .scroll-line::after {
    content: ''; position: absolute; top: -100%; left: 0; width: 100%; height: 100%;
    background: var(--blue); animation: scrollAnim 2s ease-in-out infinite;
  }
  @keyframes scrollAnim { 0%{top:-100%} 100%{top:100%} }

  /* ══════════════════
     HOME — Featured 16:9 × 2col
  ══════════════════ */
  .home-projects { padding: 120px 48px 0; }

  .featured-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px;
  }
  .featured-item {
    position: relative; overflow: hidden; cursor: pointer;
    background: #0e0e0e;
    aspect-ratio: 16 / 9;   /* ← 16:9 fixed */
  }
  .featured-item-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-en); font-size: 10px; letter-spacing: 0.14em;
    text-transform: uppercase; color: #1e1e1e;
    transition: transform 0.7s cubic-bezier(0.4,0,0.2,1);
    position: relative;
  }
  .featured-item:hover .featured-item-placeholder { transform: scale(1.04); }

  .featured-item-info {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 28px 28px 24px;
    background: linear-gradient(transparent 15%, rgba(0,0,0,0.88) 100%);
    transform: translateY(6px); opacity: 0; transition: all 0.38s ease;
  }
  .featured-item:hover .featured-item-info { transform: translateY(0); opacity: 1; }
  .featured-item-category {
    font-family: var(--font-en); font-size: 10px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--blue); margin-bottom: 6px;
    white-space: nowrap;
  }
  .featured-item-title { font-size: 18px; font-weight: 400; color: var(--white); word-break: keep-all; }

  /* ══════════════════
     ABOUT
  ══════════════════ */
  .about-hero { padding: 160px 48px 72px; }
  .about-title {
    font-size: clamp(44px, 6.5vw, 96px);
    line-height: 1.06; letter-spacing: -0.025em;
    font-weight: 300; color: var(--white); word-break: keep-all;
    font-family: var(--font-en);
  }
  .about-body {
    display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
    padding: 72px 48px 120px;
    border-top: 1px solid var(--border);
  }
  .about-text p {
    font-size: 16px; line-height: 1.9; color: #888;
    margin-bottom: 28px; word-break: keep-all; word-wrap: break-word;
    font-family: var(--font-ko);
  }
  .about-text p .meta-block { display: inline; }
  /* about body text: use Helvetica in EN mode via JS .en class */
  .about-text p.en { font-family: var(--font-en); font-size: 15px; line-height: 1.85; }

  /* About body: left col wider for text */
  .about-body-text-wide { font-size: 18px; line-height: 1.85; color: #777; max-width: 520px; }
  .about-body-text-wide.en { font-family: var(--font-en); font-size: 17px; }

  /* ══════════════════
     PROJECT INDEX
  ══════════════════ */
  .project-index-header { padding: 160px 48px 72px; border-bottom: 1px solid var(--border); }
  .project-index-title {
    font-size: clamp(40px, 6vw, 88px);
    font-weight: 300; letter-spacing: -0.025em;
    line-height: 1.05; color: var(--white); word-break: keep-all;
  }
  .project-list { padding: 0; }
  .project-row {
    display: grid; grid-template-columns: 64px 1fr 220px 120px;
    align-items: center; gap: 24px; padding: 28px 48px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; position: relative; overflow: hidden;
  }
  .project-row::before {
    content: ''; position: absolute; inset: 0;
    background: #0d1a3a; transform: scaleX(0); transform-origin: left;
    transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); z-index: 0;
  }
  .project-row:hover::before { transform: scaleX(1); }
  .project-row > * { position: relative; z-index: 1; }
  .project-row:hover .project-row-num { color: var(--blue); }
  .project-row:hover .project-row-name,
  .project-row:hover .project-row-cat,
  .project-row:hover .project-row-year { color: var(--white); }
  .project-row-num { font-family: var(--font-en); font-size: 11px; color: #2a2a2a; letter-spacing: 0.08em; transition: color var(--tr); }
  .project-row-name { font-size: clamp(18px,2vw,28px); font-weight: 400; color: #555; transition: color var(--tr); word-break: keep-all; }
  .project-row-cat { font-family: var(--font-en); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: #2a2a2a; transition: color var(--tr); white-space: nowrap; }
  .project-row-year { font-family: var(--font-en); font-size: 12px; color: #2a2a2a; text-align: right; transition: color var(--tr); }

  /* ══════════════════
     SKETCHES — 3:4, 3-col masonry
  ══════════════════ */
  .sketches-header {
    padding: 160px 48px 72px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .sketches-title {
    font-size: clamp(40px, 6vw, 88px);
    font-weight: 300; letter-spacing: -0.025em;
    line-height: 1.05; color: var(--white); word-break: keep-all;
  }
  .sketches-count {
    font-family: var(--font-en);
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: #2a2a2a; padding-bottom: 8px;
  }
  .sketches-filters {
    padding: 24px 48px;
    display: flex; gap: 8px; align-items: center;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }
  .filter-label {
    font-family: var(--font-en);
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: #333; margin-right: 8px; white-space: nowrap;
  }
  .filter-btn {
    font-family: var(--font-en);
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    color: #333; background: none;
    border: 1px solid #1e1e1e; padding: 7px 16px;
    cursor: pointer; white-space: nowrap;
    transition: color var(--tr), border-color var(--tr), background var(--tr);
  }
  .filter-btn:hover { color: var(--white); border-color: #333; }
  .filter-btn.active { color: var(--white); border-color: var(--blue); background: rgba(74,126,255,0.08); }

  /* Masonry 3-col, each card forced 3:4 */
  .sketches-grid {
    padding: 3px 48px 0;
    column-count: 3;
    column-gap: 3px;
  }
  .sketch-item {
    break-inside: avoid;
    margin-bottom: 3px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: #0e0e0e;
    /* 3:4 ratio via padding-top trick so column masonry respects it */
    padding-top: calc(100% * 4 / 3);
  }
  .sketch-inner {
    position: absolute;
    inset: 0;
  }
  .sketch-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-en);
    font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #1c1c1c;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  }
  .sketch-item:hover .sketch-placeholder { transform: scale(1.05); }

  .sketch-num {
    position: absolute; bottom: 14px; left: 16px;
    font-family: var(--font-en); font-size: 10px; letter-spacing: 0.08em;
    color: #2a2a2a; z-index: 2; pointer-events: none;
    transition: color var(--tr);
  }
  .sketch-overlay {
    position: absolute; inset: 0; z-index: 3;
    background: rgba(0,0,0,0.72);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 22px 20px;
    opacity: 0; transition: opacity 0.3s ease;
  }
  .sketch-item:hover .sketch-overlay { opacity: 1; }
  .sketch-overlay-cat {
    font-family: var(--font-en); font-size: 9px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--blue); margin-bottom: 5px;
    white-space: nowrap;
  }
  .sketch-overlay-title { font-size: 14px; font-weight: 400; color: var(--white); word-break: keep-all; line-height: 1.4; }
  .sketch-overlay-arrow {
    position: absolute; top: 16px; right: 18px;
    font-family: var(--font-en); font-size: 16px; color: var(--white); opacity: 0.5;
  }
  .sketch-item::after {
    content: ''; position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at 50% 80%, rgba(30,60,200,0.20) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.45s ease; pointer-events: none;
  }
  .sketch-item:hover::after { opacity: 1; }

  /* ══════════════════
     PROJECT DETAIL
  ══════════════════ */
  .project-detail-hero {
    height: 85vh; min-height: 520px;
    background: #0e0e0e;
    position: relative; overflow: hidden; display: flex; align-items: flex-end;
  }
  .project-detail-hero-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-en); font-size: 11px; letter-spacing: 0.14em;
    text-transform: uppercase; color: #1a1a1a; position: absolute; inset: 0;
  }
  .project-detail-hero-info {
    position: relative; z-index: 2; padding: 56px 48px;
    color: var(--white);
    background: linear-gradient(transparent 15%, rgba(0,0,0,0.88) 100%);
    width: 100%;
  }
  .project-detail-cat {
    font-family: var(--font-en); font-size: 10px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--blue); margin-bottom: 12px;
    white-space: nowrap;
  }
  .project-detail-title {
    font-size: clamp(40px, 6vw, 88px);
    font-weight: 300; letter-spacing: -0.025em; line-height: 1.04; word-break: keep-all;
  }
  .project-detail-body {
    display: grid; grid-template-columns: 2fr 1fr;
    gap: 80px; padding: 80px 48px;
  }
  .project-detail-desc p {
    font-size: 16px; line-height: 1.9; color: #666;
    margin-bottom: 24px; max-width: 560px;
    word-break: keep-all; word-wrap: break-word;
  }

  /* ── Gallery: 16:9 cells, flexible col layout ── */
  .project-gallery {
    padding: 0 100px 100px;
    display: grid;
    gap: 3px;
  }
  /* col layout classes applied by JS */
  .gallery-col-1 { grid-template-columns: 1fr; }
  .gallery-col-2 { grid-template-columns: 1fr 1fr; }
  .gallery-col-3 { grid-template-columns: 1fr 1fr 1fr; }

  .gallery-item {
    aspect-ratio: 16 / 9;      /* ← all 16:9 */
    background: #0e0e0e;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-en); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; color: #1c1c1c;
    position: relative; overflow: hidden;
  }
  /* span helpers for mixed-col rows */
  .gallery-item.span-2 { grid-column: span 2; }
  .gallery-item img { cursor: zoom-in; }
  /* lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(0,0,0,0.92); align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  #lightbox.active { display: flex; }
  #lightbox img {
    max-width: 90vw; max-height: 90vh; object-fit: contain;
    animation: lbIn 0.22s cubic-bezier(0.4,0,0.2,1);
  }
  @keyframes lbIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
  #lightboxClose {
    position: absolute; top: 24px; right: 32px;
    font-family: var(--font-en); font-size: 11px; letter-spacing: 0.18em;
    text-transform: uppercase; color: rgba(255,255,255,0.5);
    cursor: pointer; background: none; border: none; padding: 0;
  }
  #lightboxClose:hover { color: #fff; }
  .lb-arrow {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: rgba(255,255,255,0.4);
    font-size: 28px; cursor: pointer; padding: 16px 24px;
    transition: color 0.2s; user-select: none; z-index: 1;
  }
  .lb-arrow:hover { color: #fff; }
  #lbPrev { left: 0; }
  #lbNext { right: 0; }
  .lb-counter {
    position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: var(--font-en); font-size: 10px; letter-spacing: 0.18em;
    color: rgba(255,255,255,0.35); text-transform: uppercase;
  }
  .gallery-item.span-3 { grid-column: span 3; }

  .project-back { padding: 48px 48px 0; }
  .project-nav-footer {
    border-top: 1px solid var(--border);
    padding: 48px; display: flex; justify-content: space-between; align-items: center;
  }
  .project-nav-item { cursor: pointer; transition: opacity var(--tr); }
  .project-nav-item:hover { opacity: 0.5; }
  .project-nav-label {
    font-family: var(--font-en); font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: #333; margin-bottom: 10px;
  }
  .project-nav-name { font-size: 20px; font-weight: 400; word-break: keep-all; }

  /* ══════════════════
     RESPONSIVE
  ══════════════════ */
  @media (max-width: 1024px) {
    .sketches-grid { column-count: 2; }
  }
  @media (max-width: 768px) {
    nav { padding: 18px 24px; }
    .nav-links { gap: 16px; }
    .hero, .home-projects, .about-body, .project-index-header,
    .about-hero, .project-detail-body, .project-gallery,
    .project-back, .project-nav-footer, footer,
    .sketches-header, .sketches-filters, .sketches-grid { padding-left: 24px; padding-right: 24px; }
    .featured-grid { grid-template-columns: 1fr; }
    .about-body { grid-template-columns: 1fr; gap: 48px; }
    .project-row { grid-template-columns: 40px 1fr; padding: 20px 24px; }
    .project-row-cat, .project-row-year { display: none; }
    .project-detail-body { grid-template-columns: 1fr; gap: 40px; }
    .gallery-col-2, .gallery-col-3 { grid-template-columns: 1fr; }
    .gallery-item.span-2, .gallery-item.span-3 { grid-column: span 1; }
    .project-nav-footer { flex-direction: column; gap: 28px; align-items: flex-start; }
    footer { flex-direction: column; gap: 28px; align-items: flex-start; }
    .footer-links { text-align: left; }
    .sketches-header { flex-direction: column; align-items: flex-start; gap: 20px; }
    .sketches-grid { column-count: 1; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav id="mainNav">
  <div class="nav-mark" onclick="navigate('home')"></div>
  <ul class="nav-links">
    <li><a id="nav-about"    onclick="navigate('about')"    data-i18n="nav_about"></a></li>
    <li><a id="nav-projects" onclick="navigate('projects')" data-i18n="nav_projects"></a></li>

function applyFontClass(el) {

/* ── TRANSLATIONS ── */
function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const raw = t(el.getAttribute('data-i18n'));
    // double-newline → paragraph break, single-newline → <br>
    el.innerHTML = raw
      .split('\n\n')
      .map(block => `<span class="meta-block">${block.replace(/\n/g,'<br>')}</span>`)
      .join('');
  });
  ['heroTitle','aboutTitle','projectsTitle','sketchesTitle'].forEach(id => applyFontClass(document.getElementById(id)));
  const hs = document.getElementById('heroSub');
  if (hs) hs.style.fontFamily = isEn() ? 'var(--font-en)' : 'var(--font-ko)';
  ['footer-name-home','footer-name-about','footer-name-projects','footer-name-sketches'].forEach(id => applyFontClass(document.getElementById(id)));

  updateSketchCount();
  setNavActive();
  /* about paragraphs font */
  ['about-p1','about-p2','about-p3'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.toggle('en', isEn());
  });
}

function setLang(lang) {
  currentLang = lang;
  document.getElementById('btnKo').classList.toggle('active', lang==='ko');
  document.getElementById('btnEn').classList.toggle('active', lang==='en');
  applyTranslations();
  const aid = document.querySelector('.page.active')?.id;
  if (aid==='page-projects') renderProjectList();
  if (aid==='page-project')  renderProjectDetail(currentProjectId);
  if (aid==='page-sketches') renderSketches();
}

/* ── NAVIGATE ── */
function navigate(page, data) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  let id;
  if      (page==='home')     id = 'page-home';
  else if (page==='about')    id = 'page-about';
  else if (page==='projects') { id='page-projects'; renderProjectList(); }
  else if (page==='sketches') { id='page-sketches'; renderSketches(); }
  else if (page==='project')  {
    id='page-project';
    currentProjectId = (data && data.id !== undefined) ? data.id : data;
    prevPage = (data && data.from) ? data.from : 'projects';
    renderProjectDetail(currentProjectId);
  }
  const el = document.getElementById(id);
  if (el) { el.classList.add('active'); window.scrollTo({top:0,behavior:'instant'}); }
  setNavActive();
}

function setNavActive() {
  const aid = document.querySelector('.page.active')?.id || '';
  document.getElementById('nav-about').classList.toggle('nav-active',    aid==='page-about');
  document.getElementById('nav-projects').classList.toggle('nav-active', aid==='page-projects');
  document.getElementById('nav-sketches').classList.toggle('nav-active', aid==='page-sketches');
}

        : `Project Image ${pad(p.id+1)}`;
    return `<div class="featured-item" onclick="navigate('project',{id:${p.id},from:'projects'})">

}

  const el = document.getElementById('sketchesCount');
  if (!el) return;
  const n = sketchFilter===null ? SKETCHES.length : SKETCHES.filter(s=>s.projectId===sketchFilter).length;
  el.textContent = `${pad(n)} ${isEn()?'works':'점'}`;
}

/* ── PROJECT DETAIL ── */
let imgCounter = 0;
function renderProjectDetail(id) {
  const p = PROJECTS[id];
  if (!p) return;

  document.getElementById('detailCat').textContent = p.cat[currentLang];
  const te = document.getElementById('detailTitle');
  te.textContent = p.title[currentLang]; applyFontClass(te);
  const _ph = document.getElementById('detailPlaceholder');
  if (p.heroVideo) {
    _ph.innerHTML = `<video src="${p.heroVideo}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"></video>`;
  } else if (p.heroImage) {
    _ph.innerHTML = `<img src="${p.heroImage}" alt="${p.title[currentLang]}" style="width:100%;height:100%;object-fit:cover;display:block;">`;
  } else {
    _ph.textContent = p.title[currentLang];
  }

  /* back button */
  const bb = document.getElementById('detailBackBtn');
  if (prevPage==='sketches') {
    bb.textContent = t('back_from_sketch');
    bb.onclick = () => navigate('sketches');
  } else {
    bb.textContent = t('back_btn');
    bb.onclick = () => navigate('projects');
  }

  /* desc */
  document.getElementById('detailDesc').innerHTML = p.desc[currentLang].map(txt=>
    `<p${isEn()?' class="en"':''}>${txt}</p>`).join('');

  /* meta */
  document.getElementById('detailMeta').innerHTML = p.meta[currentLang].map(([l,v])=>
    `<div class="meta-group"><div class="meta-label">${l}</div><div class="meta-value${isEn()?' en':''}">${v}</div></div>`
  ).join('');

  /* gallery — row-by-row, each cell 16:9 */
  imgCounter = 0;
  const gallEl = document.getElementById('detailGallery');
  /* clear col class */
  gallEl.className = 'project-gallery';

  const rows = p.gallery;
  /* We render each row as its own sub-grid div */
  gallEl.innerHTML = rows.map(row => {
    const cells = Array.from({length: row.items}, () => {
      imgCounter++;
      return `<div class="gallery-item">${t('gallery_img')} ${pad(imgCounter)}</div>`;
    }).join('');
    return `<div class="gallery-row gallery-col-${row.cols}">${cells}</div>`;
  }).join('');
}

/* prev/next footer — separate so it renders after gallery */
function renderProjectDetail(id) {
  const p = PROJECTS[id];
  if (!p) return;

  document.getElementById('detailCat').textContent = p.cat[currentLang];

  const te = document.getElementById('detailTitle');
  te.textContent = p.title[currentLang]; applyFontClass(te);

  /* subtitle in hero */
  let subtitleEl = document.getElementById('detailSubtitle');
  if (!subtitleEl) {
    subtitleEl = document.createElement('div');
    subtitleEl.id = 'detailSubtitle';
    subtitleEl.className = 'project-detail-subtitle';
    te.insertAdjacentElement('afterend', subtitleEl);
  }
  subtitleEl.textContent = p.subtitle[currentLang];

  const placeholder = document.getElementById('detailPlaceholder');
  if (p.heroVideo) {
    placeholder.innerHTML = `<video src="${p.heroVideo}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;"></video>`;
  } else if (p.heroImage) {
    placeholder.innerHTML = `<img src="${p.heroImage}" alt="${p.title[currentLang]}" style="width:100%;height:100%;object-fit:cover;object-position:top;display:block;">`;
  } else {
    placeholder.textContent = p.title[currentLang];
  }

  const bb = document.getElementById('detailBackBtn');
  if (prevPage==='sketches') {
    bb.textContent = t('back_from_sketch'); bb.onclick = ()=>navigate('sketches');
  } else {
    bb.textContent = t('back_btn'); bb.onclick = ()=>navigate('projects');
  }

  /* description + responsibilities */
  const resp = p.responsibilities[currentLang];
  const respHtml = resp && resp.length
    ? `<div class="detail-responsibilities">
         <div class="detail-resp-label">${isEn() ? 'Responsibilities' : '담당 역할'}</div>
         <div class="detail-resp-tags">${resp.map(r=>`<span class="resp-tag">${r}</span>`).join('')}</div>
       </div>`
    : '';

  document.getElementById('detailDesc').innerHTML =
    p.desc[currentLang].map(txt=>`<p${isEn()?' class="en"':''}>${txt}</p>`).join('') + respHtml;

  document.getElementById('detailMeta').innerHTML = p.meta[currentLang].map(([l,v])=>
    `<div class="meta-group"><div class="meta-label">${l}</div><div class="meta-value${isEn()?' en':''}">${v}</div></div>`
  ).join('');

  /* gallery rows */
  let n = 0;
  document.getElementById('detailGallery').innerHTML = (p.images || p.gallery || []).map(row=>{
    let cells;
    if (p.images) {
      cells = row.src.map(src => {
        const isVideo = src.match(/\.(mp4|webm|mov)$/i);
        const media = isVideo
          ? `<video src="${src}" autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover;display:block;"></video>`
          : `<img src="${src}" style="width:100%;height:100%;object-fit:cover;display:block;" onclick="openLightbox(this)">`;
        return `<div class="gallery-item">${media}</div>`;
      }).join('');
    } else {
      cells = Array.from({length:row.items},()=>{
        n++;
        return `<div class="gallery-item">${t('gallery_img')} ${pad(n)}</div>`;
      }).join('');
    }
    return `<div class="gallery-row gallery-col-${row.cols}">${cells}</div>`;
  }).join('');

  /* prev / next */
  const prev=PROJECTS[id-1], next=PROJECTS[id+1];
  document.getElementById('projectNavFooter').innerHTML =
    (prev
      ? `<div class="project-nav-item" onclick="navigate('project',{id:${id-1},from:'${prevPage}'})">
           <div class="project-nav-label">← ${t('prev_project')}</div>
           <div class="project-nav-name${isEn()?' en':''}">${prev.title[currentLang]}</div>
         </div>`
      : '<div></div>') +
    (next
      ? `<div class="project-nav-item" style="text-align:right" onclick="navigate('project',{id:${id+1},from:'${prevPage}'})">
           <div class="project-nav-label">${t('next_project')} →</div>
           <div class="project-nav-name${isEn()?' en':''}">${next.title[currentLang]}</div>
         </div>`
      : '<div></div>');
}

/* gallery-row needs its own grid */
</script>

<script>
/* NAV SCROLL */
window.addEventListener('scroll', ()=>{
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY>20);
});

/* HERO BLOB */
const heroSection = document.getElementById('heroSection');
const heroBlob    = document.getElementById('heroBlob');
heroSection.addEventListener('mousemove', e=>{
  const r = heroSection.getBoundingClientRect();
  heroBlob.style.left = (e.clientX-r.left)+'px';
  heroBlob.style.top  = (e.clientY-r.top)+'px';
});

/* INIT */
applyTranslations();

/* ── lightbox ── */
let _lbImgs = [], _lbIdx = 0;
function openLightbox(img) {
  // 현재 프로젝트의 모든 갤러리 이미지 수집
  _lbImgs = Array.from(document.querySelectorAll('#detailGallery .gallery-item img'));
  _lbIdx  = _lbImgs.indexOf(img);
  _lbShow();
  document.getElementById('lightbox').classList.add('active');
  document.body.style.overflow = 'hidden';
}
function _lbShow() {
  document.getElementById('lightboxImg').src = _lbImgs[_lbIdx].src;
  document.getElementById('lbCounter').textContent = (_lbIdx+1) + ' / ' + _lbImgs.length;
  document.getElementById('lbPrev').style.opacity = _lbIdx > 0 ? '1' : '0.2';
  document.getElementById('lbNext').style.opacity = _lbIdx < _lbImgs.length-1 ? '1' : '0.2';
}
function lbNav(dir) {
  event.stopPropagation();
  _lbIdx = Math.max(0, Math.min(_lbImgs.length-1, _lbIdx+dir));
  _lbShow();
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});
const _lb = document.getElementById('lightbox');
if (_lb) _lb.addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});
</script>
  <div id="lightbox">
    <button id="lightboxClose" onclick="closeLightbox()">CLOSE ✕</button>
    <button class="lb-arrow" id="lbPrev" onclick="lbNav(-1)">&#8592;</button>
    <img id="lightboxImg" src="" alt="" onclick="lbNav(1)">
    <button class="lb-arrow" id="lbNext" onclick="lbNav(1)">&#8594;</button>
    <div class="lb-counter" id="lbCounter"></div>
  </div>
</body>
</html>
